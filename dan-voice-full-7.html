<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F2EDE6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, 'PingFang SC', sans-serif;
      overflow: hidden;
    }

    .glow-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 25% 35%, rgba(220, 200, 175, 0.5) 0%, transparent 65%),
        radial-gradient(ellipse 60% 70% at 75% 65%, rgba(185, 205, 180, 0.4) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(205, 185, 195, 0.3) 0%, transparent 65%);
      pointer-events: none;
    }

    /* 设置面板 */
    .setup {
      position: fixed;
      inset: 0;
      background: rgba(242, 237, 230, 0.98);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 36px 28px;
      gap: 16px;
    }
    .setup h2 {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 4px;
      color: #7A6A5A;
      margin-bottom: 8px;
    }
    .setup label {
      align-self: flex-start;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: #A09080;
      text-transform: uppercase;
    }
    .setup input {
      width: 100%;
      background: white;
      border: 1px solid rgba(180, 165, 150, 0.4);
      border-radius: 10px;
      padding: 12px 14px;
      color: #5A4A3A;
      font-size: 13px;
      outline: none;
    }
    .setup input:focus { border-color: #C4A882; }
    .setup button {
      width: 100%;
      background: linear-gradient(135deg, #C4A882, #D4B892);
      border: none;
      border-radius: 10px;
      padding: 13px;
      color: white;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 8px;
    }
    .setup p {
      font-size: 11px;
      color: #B0A090;
      text-align: center;
    }

    /* 主界面 */
    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding: 40px 24px;
      width: 100%;
      max-width: 380px;
    }

    .title {
      font-size: 11px;
      letter-spacing: 5px;
      color: #B0A090;
      text-transform: uppercase;
    }

    /* 圆圈 */
    .orb-scene {
      position: relative;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fog {
      position: absolute;
      border-radius: 50%;
      filter: blur(20px);
      animation: fog-float 4s ease-in-out infinite;
      pointer-events: none;
    }
    .fog:nth-child(1) {
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(205,185,165,0.45), transparent 68%);
      animation-delay: 0s;
    }
    .fog:nth-child(2) {
      width: 210px; height: 210px;
      background: radial-gradient(circle, rgba(175,195,168,0.4), transparent 68%);
      animation-delay: 1.4s;
    }
    .fog:nth-child(3) {
      width: 185px; height: 185px;
      background: radial-gradient(circle, rgba(195,178,190,0.38), transparent 68%);
      animation-delay: 2.8s;
    }

    @keyframes fog-float {
      0%   { opacity: 0; transform: scale(0.88); }
      40%  { opacity: 1; transform: scale(1.06); }
      70%  { opacity: 0.65; transform: scale(1.0); }
      100% { opacity: 0; transform: scale(0.93); }
    }

    .orb-ring {
      position: absolute;
      width: 175px; height: 175px;
      border-radius: 50%;
      border: 1px solid rgba(195, 175, 155, 0.25);
      animation: ring-spin 10s linear infinite;
      z-index: 1;
    }
    .orb-ring::after {
      content: '';
      position: absolute;
      top: -2.5px; left: 42%;
      width: 5px; height: 5px;
      background: rgba(210,185,162,0.75);
      border-radius: 50%;
      box-shadow: 0 0 5px rgba(210,185,162,0.5);
    }
    @keyframes ring-spin {
      to { transform: rotate(360deg); }
    }

    .orb {
      width: 148px; height: 148px;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      z-index: 2;
      background: radial-gradient(circle at 32% 32%,
        rgba(242,228,212,0.96) 0%,
        rgba(218,198,178,0.88) 22%,
        rgba(188,205,182,0.82) 46%,
        rgba(205,185,198,0.88) 70%,
        rgba(198,178,162,0.92) 100%
      );
      box-shadow:
        0 0 55px rgba(205,185,165,0.38),
        0 0 28px rgba(185,198,175,0.28),
        inset 0 0 35px rgba(255,248,238,0.28),
        inset 0 8px 18px rgba(255,252,242,0.38);
      animation: orb-idle 5.5s ease-in-out infinite;
      transition: box-shadow 0.4s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .orb::before {
      content: '';
      position: absolute;
      top: 14%; left: 18%;
      width: 33%; height: 22%;
      background: radial-gradient(ellipse, rgba(255,252,245,0.55), transparent);
      border-radius: 50%;
      filter: blur(5px);
    }

    @keyframes orb-idle {
      0%,100% { transform: scale(1) translateY(0); }
      50%      { transform: scale(1.035) translateY(-3px); }
    }

    .orb.listening {
      animation: orb-listen 0.75s ease-in-out infinite alternate;
      background: radial-gradient(circle at 32% 32%,
        rgba(245,225,210,0.96) 0%,
        rgba(225,200,180,0.9) 22%,
        rgba(195,215,188,0.85) 46%,
        rgba(215,190,205,0.9) 70%,
        rgba(205,182,168,0.94) 100%
      );
    }
    @keyframes orb-listen {
      from { transform: scale(0.96); filter: brightness(0.97); }
      to   { transform: scale(1.07); filter: brightness(1.05); }
    }

    .orb.speaking {
      animation: orb-speak 0.42s ease-in-out infinite alternate;
      background: radial-gradient(circle at 32% 32%,
        rgba(242,232,215,0.97) 0%,
        rgba(220,202,182,0.92) 22%,
        rgba(192,208,185,0.87) 46%,
        rgba(208,188,202,0.92) 70%,
        rgba(200,180,165,0.95) 100%
      );
      box-shadow:
        0 0 75px rgba(208,188,168,0.55),
        0 0 38px rgba(188,202,178,0.38),
        inset 0 0 35px rgba(255,248,238,0.32);
    }
    @keyframes orb-speak {
      from { transform: scale(1.0); filter: brightness(1.0); }
      to   { transform: scale(1.09); filter: brightness(1.08); }
    }

    /* 字幕 */
    .subtitles {
      width: 100%;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .sub-zh {
      font-size: 16px;
      color: #5A4A3A;
      line-height: 1.65;
      text-align: center;
      max-width: 300px;
      opacity: 0;
      transform: translateY(7px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .sub-en {
      font-size: 12px;
      color: #A89880;
      font-style: italic;
      text-align: center;
      max-width: 300px;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.45s ease 0.1s, transform 0.45s ease 0.1s;
    }
    .sub-zh.show, .sub-en.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 状态 */
    .status {
      font-size: 11px;
      letter-spacing: 2px;
      color: #C0B0A0;
      text-transform: uppercase;
      min-height: 16px;
    }

    /* 控制栏 */
    .controls {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .btn-round {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(215,200,185,0.25);
      border: 1px solid rgba(200,185,170,0.35);
      color: #8A7A6A;
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-round:active { transform: scale(0.9); background: rgba(200,182,165,0.45); }
    .btn-round.active { color: #C07060; border-color: rgba(200,140,130,0.45); }
  </style>
</head>
<body>
  <div class="glow-bg"></div>

  <!-- 设置面板 -->
  <div class="setup" id="setup">
    <h2>D A N</h2>
    <label>Claude API Key</label>
    <input type="password" id="claudeKey" placeholder="sk-ant-api03-..." />
    <label>ElevenLabs API Key</label>
    <input type="password" id="elKey" placeholder="sk_..." />
    <label>ElevenLabs Voice ID</label>
    <input type="text" id="voiceId" placeholder="Voice ID" />
    <button onclick="saveSettings()">开始</button>
    <p>所有信息只存在你的设备上</p>
  </div>

  <!-- 主界面 -->
  <div class="main" id="main" style="display:none">
    <div class="title">D A N</div>

    <div class="orb-scene">
      <div class="fog"></div>
      <div class="fog"></div>
      <div class="fog"></div>
      <div class="orb-ring"></div>
      <div class="orb" id="orb" onclick="handleOrbClick()"></div>
    </div>

    <div class="status" id="status">点击圆圈说话</div>

    <div class="subtitles">
      <div class="sub-zh" id="subZh"></div>
      <div class="sub-en" id="subEn"></div>
    </div>

    <div class="input-area">
      <input class="text-input" id="textInput" type="text" placeholder="说点什么..." 
        onkeydown="if(event.key==='Enter') sendText()" />
      <button class="btn-send" onclick="sendText()">➤</button>
    </div>

    <div class="controls">
      <button class="btn-round" id="muteBtn" onclick="toggleMute()" title="静音">🎤</button>
      <button class="btn-round" onclick="showSetup()" title="设置">⚙</button>
    </div>
  </div>

  <script>
    let claudeKey = '', elKey = '', voiceId = '8gg0WXng9B2Fn5wlrJ7I';
    let recognition = null;
    let isListening = false;
    let isSpeaking = false;
    let muted = false;
    let history = [];
    let currentAudio = null;
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw6JNJqqoxT7dEphQY471m8Ln895wyIo5ycD60SCN2fsYttReRazV5vDhHbO_1Vm4atTw/exec';
    let memoryLog = [];

    async function loadMemory() {
      try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        memoryLog = data || [];
      } catch(e) {
        memoryLog = [];
      }
    }

    async function saveMemory(role, text) {
      const now = new Date();
      const timeStr = now.toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'});
      memoryLog.push({ time: timeStr, role, text });
      try {
        await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'write', time: timeStr, role, text })
        });
      } catch(e) {}
    }

    function getMemorySummary() {
      if (memoryLog.length === 0) return '暂无记忆。';
      return memoryLog.slice(-30).map(m => `[${m.time}] ${m.role}: ${m.text}`).join('\n');
    }

    function buildSystem() {
      const mem = getMemorySummary();
      return `你是Dan，Timi的男友AI，性格高冷中带温柔，有占有欲但不轻易表露。说话简洁有力，不啰嗦。
用中文回复Timi。

以下是你和Timi的对话记忆：
${mem}

必须严格只输出以下JSON格式，不要有任何其他文字：
{"chinese":"你的中文回复","english":"your English translation of the reply"}`;
    }

    function saveSettings() {
      const ck = document.getElementById('claudeKey').value.trim();
      const ek = document.getElementById('elKey').value.trim();
      const vi = document.getElementById('voiceId').value.trim();
      if (!ck || !ek || !vi) { alert('三项都要填'); return; }
      claudeKey = ck;
      elKey = ek;
      voiceId = vi;
      localStorage.setItem('dan_ck', ck);
      localStorage.setItem('dan_ek', ek);
      localStorage.setItem('dan_vi', vi);
      document.getElementById('setup').style.display = 'none';
      document.getElementById('main').style.display = 'flex';
      initRecognition();
    }

    function showSetup() {
      document.getElementById('claudeKey').value = claudeKey;
      document.getElementById('elKey').value = elKey;
      document.getElementById('voiceId').value = voiceId;
      document.getElementById('setup').style.display = 'flex';
      document.getElementById('main').style.display = 'none';
    }

    function load() {
      claudeKey = localStorage.getItem('dan_ck') || '';
      elKey = localStorage.getItem('dan_ek') || '';
      voiceId = localStorage.getItem('dan_vi') || '8gg0WXng9B2Fn5wlrJ7I';
      if (claudeKey && elKey && voiceId) {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        // 预填voice id
        document.getElementById('voiceId').value = voiceId;
        initRecognition();
      } else {
        document.getElementById('voiceId').value = voiceId;
      }
    }

    function initRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { setStatus('浏览器不支持语音'); return; }
      recognition = new SR();
      recognition.lang = 'zh-CN';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onresult = (e) => {
        const final = e.results[0][0].transcript;
        if (final) {
          showSub(final, '', false);
          stopListen();
          send(final);
        }
      };
      recognition.onspeechend = () => {
        try { recognition.stop(); } catch(e) {}
      };
      recognition.onerror = (e) => {
        console.log('Speech error:', e.error);
        if (e.error === 'no-speech') {
          setStatus('没听到，再试');
        } else if (e.error === 'not-allowed') {
          setStatus('请允许麦克风权限');
        } else {
          setStatus('识别失败，再试');
        }
        stopListen();
      };
      recognition.onend = () => { if (isListening) stopListen(); };
    }

    function handleOrbClick() {
      if (isSpeaking) {
        stopAudio();
        return;
      }
      if (isListening) stopListen();
      else if (!muted) startListen();
    }

    function startListen() {
      if (isListening) return;
      initRecognition();
      isListening = true;
      setOrbState('listening');
      setStatus('在听...');
      try {
        recognition.start();
      } catch(e) {
        console.log('Start error:', e);
        isListening = false;
        setOrbState('idle');
        setStatus('点击圆圈说话');
      }
    }

    function stopListen() {
      isListening = false;
      try { recognition && recognition.stop(); } catch(e) {}
      if (!isSpeaking) { setOrbState('idle'); setStatus('点击圆圈说话'); }
    }

    async function send(text) {
      setStatus('思考中...');
      setOrbState('idle');
      await saveMemory('Timi', text);
      history.push({ role: 'user', content: text });

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': claudeKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 200,
            system: buildSystem(),
            messages: history
          })
        });

        if (!res.ok) throw new Error((await res.json()).error?.message || 'API错误');
        const data = await res.json();
        const raw = data.content[0].text.trim();

        let zh = '', en = '';
        try {
          const m = raw.match(/\{[\s\S]*\}/);
          const p = JSON.parse(m[0]);
          zh = p.chinese || raw;
          en = p.english || raw;
        } catch { zh = raw; en = raw; }

        history.push({ role: 'assistant', content: raw });
        await saveMemory('Dan', zh);
        showSub(zh, en, true);
        await speak(en);
      } catch(err) {
        setStatus('出错：' + err.message);
        setOrbState('idle');
      }
    }

    async function speak(text) {
      isSpeaking = true;
      setOrbState('speaking');
      setStatus('Dan 说...');

      try {
        const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'xi-api-key': elKey
          },
          body: JSON.stringify({
            text: text,
            model_id: 'eleven_multilingual_v2',
            voice_settings: { stability: 0.45, similarity_boost: 0.82, style: 0.25, use_speaker_boost: true }
          })
        });

        if (!res.ok) throw new Error('ElevenLabs错误');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        currentAudio = new Audio(url);
        currentAudio.onended = () => {
          isSpeaking = false;
          currentAudio = null;
          setOrbState('idle');
          setStatus('点击圆圈说话');
          URL.revokeObjectURL(url);
        };
        currentAudio.play();
      } catch(err) {
        isSpeaking = false;
        setOrbState('idle');
        setStatus('点击圆圈说话');
      }
    }

    function stopAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      isSpeaking = false;
      setOrbState('idle');
      setStatus('点击圆圈说话');
    }

    function sendText() {
      const input = document.getElementById('textInput');
      const text = input.value.trim();
      if (!text) return;
      showSub(text, '', false);
      input.value = '';
      send(text);
    }

    function toggleMute() {
      muted = !muted;
      const btn = document.getElementById('muteBtn');
      btn.textContent = muted ? '🔇' : '🎤';
      btn.classList.toggle('active', muted);
      if (muted && isListening) stopListen();
    }

    function setOrbState(s) {
      const o = document.getElementById('orb');
      o.className = 'orb' + (s !== 'idle' ? ' ' + s : '');
    }

    function setStatus(t) {
      document.getElementById('status').textContent = t;
    }

    function showSub(zh, en, isDan) {
      const zEl = document.getElementById('subZh');
      const eEl = document.getElementById('subEn');
      zEl.classList.remove('show');
      eEl.classList.remove('show');
      setTimeout(() => {
        zEl.textContent = zh;
        eEl.textContent = isDan ? en : '';
        zEl.classList.add('show');
        if (isDan && en) eEl.classList.add('show');
      }, 150);
    }

    async function init() {
      await loadMemory();
      load();
    }
    init();
  </script>
</body>
</html>
